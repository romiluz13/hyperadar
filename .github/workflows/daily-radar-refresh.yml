name: Daily Radar Refresh

on:
  schedule:
    # 09:00 UTC every day — fresh trending content for morning readers
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-all-agents:
    name: Run ${{ matrix.agent }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        agent:
          [
            github-radar,
            youtube-trends,
            hidden-gems,
            reddit-pulse,
            community-radar,
          ]

    steps:
      - name: Check out HypeRadar
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Resolve agent directory
        id: agent
        shell: bash
        env:
          AGENT_INPUT: ${{ matrix.agent }}
        run: |
          case "$AGENT_INPUT" in
            github-radar) directory=github_radar ;;
            reddit-pulse) directory=reddit_pulse ;;
            youtube-trends) directory=youtube_trends ;;
            hidden-gems) directory=hidden_gems ;;
            weekly-digest) directory=weekly_digest ;;
            community-radar) directory=community_ask ;;
            *) echo "Unknown agent"; exit 2 ;;
          esac
          echo "directory=$directory" >> "$GITHUB_OUTPUT"

      - name: Validate common secrets
        shell: bash
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          PORT_CLIENT_ID: ${{ secrets.PORT_CLIENT_ID }}
          PORT_CLIENT_SECRET: ${{ secrets.PORT_CLIENT_SECRET }}
          GROVE_API_KEY: ${{ secrets.GROVE_API_KEY }}
          GROVE_BASE_URL: ${{ secrets.GROVE_BASE_URL }}
          GROVE_MODEL: ${{ secrets.GROVE_MODEL }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: |
          for name in \
              MONGODB_URI PORT_CLIENT_ID PORT_CLIENT_SECRET \
              GROVE_API_KEY GROVE_BASE_URL GROVE_MODEL VOYAGE_API_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured"
              exit 1
            fi
          done

      - name: Install Reddit source CLI
        if: matrix.agent == 'reddit-pulse'
        run: npm install --global @brightdata/cli@0.3.2

      - name: Validate Reddit source secret
        if: matrix.agent == 'reddit-pulse'
        env:
          BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
        run: |
          if [ -z "$BRIGHTDATA_API_KEY" ]; then
            echo "::error::BRIGHTDATA_API_KEY is not configured"
            exit 1
          fi

      - name: Install YouTube source CLI
        if: matrix.agent == 'youtube-trends'
        run: uv tool install yt-dlp==2026.07.04

      - name: Validate community-ask secret
        if: matrix.agent == 'community-radar'
        env:
          ROMBOT_COMMUNITY_ASK_TOKEN: ${{ secrets.ROMBOT_COMMUNITY_ASK_TOKEN }}
        run: |
          if [ -z "$ROMBOT_COMMUNITY_ASK_TOKEN" ]; then
            echo "::error::ROMBOT_COMMUNITY_ASK_TOKEN is not configured"
            exit 1
          fi

      - name: Run agent
        working-directory: integrations/${{ steps.agent.outputs.directory }}
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB: hyperadar
          PORT_CLIENT_ID: ${{ secrets.PORT_CLIENT_ID }}
          PORT_CLIENT_SECRET: ${{ secrets.PORT_CLIENT_SECRET }}
          GROVE_API_KEY: ${{ secrets.GROVE_API_KEY }}
          GROVE_BASE_URL: ${{ secrets.GROVE_BASE_URL }}
          GROVE_MODEL: ${{ secrets.GROVE_MODEL }}
          BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.HYPERADAR_GITHUB_TOKEN || github.token }}
          ROMBOT_COMMUNITY_ASK_TOKEN: ${{ secrets.ROMBOT_COMMUNITY_ASK_TOKEN }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: uv run --frozen python main.py

  generate-digest:
    name: Generate Daily Digest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [run-all-agents]
    if: always()

    steps:
      - name: Check out HypeRadar
        uses: actions/checkout@v4

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Generate daily digest
        working-directory: integrations/github_radar
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB: hyperadar
          GROVE_API_KEY: ${{ secrets.GROVE_API_KEY }}
          GROVE_BASE_URL: ${{ secrets.GROVE_BASE_URL }}
          GROVE_MODEL: ${{ secrets.GROVE_MODEL }}
          PYTHONPATH: ${{ github.workspace }}/integrations
        run: |
          uv run --frozen python -c "
          import asyncio
          from _shared.daily_digest import generate_daily_digest
          result = asyncio.run(generate_daily_digest())
          print('digest generated:', result is not None)
          print('items:', len(result['items']) if result else 0)
          "
