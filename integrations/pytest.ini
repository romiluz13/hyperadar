[pytest]
# Rootdir-level config so integrations/conftest.py (which defines the shared
# `db` fixture and env guard) is loaded for every agent package. Without this,
# the [tool.pytest.ini_options] in integrations/github_radar/pyproject.toml
# pulled the rootdir down to integrations/github_radar, and pytest does not
# load conftest.py files above the rootdir — so the `db` fixture vanished and
# every Atlas-dependent test errored with "fixture 'db' not found" when the
# full suite was run together (but passed in isolation).
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
pythonpath = .
